<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sales Rocket</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa; /* Color gris claro de tu paleta */
        }
        .logo-container {
            text-align: center;
        }
        img {
            max-width: 80%; /* Ajusta el tamaño del logo */
            height: auto;
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="fondo_SR.jpg" alt="Sales Rocket Logo">
    </div>
</body>
</html>
